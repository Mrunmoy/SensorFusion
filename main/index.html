<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>ECG Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #0f141a;
      --grid: #334155;
      --mid: #475569;
      --stroke: #86efac;
      --text: #cdd6f4;
      --border: #1f2937;
      --pill: #1f2937;
      --accent: #fb923c;
      --ok: #22c55e;
      --warn: #7f1d1d;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    header {
      padding: 10px 14px;
      font-weight: 600;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap
    }

    #status {
      font-size: 12px;
      opacity: .9
    }

    .pill {
      font-size: 12px;
      padding: 2px 8px;
      border: 1px solid var(--pill);
      border-radius: 999px
    }

    #lead {
      background: var(--warn);
      border-color: var(--warn);
      display: none
    }

    #wrap {
      padding: 8px 14px 14px
    }

    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin: 8px 0;
      flex-wrap: wrap
    }

    label {
      font-size: 12px;
      opacity: .9
    }

    input[type=range] {
      width: 220px;
      accent-color: var(--accent)
    }

    canvas {
      width: 100%;
      height: 320px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: block
    }

    .spacer {
      flex: 1
    }
  </style>
</head>

<body>
  <header>
    ECG Viewer
    <span id="status" class="pill">connecting…</span>
    <span id="lead" class="pill">LEADS OFF</span>
    <span id="hr" class="pill">-- bpm</span>
  </header>

  <div id="wrap">
    <div class="row">
      <label>Y scale:</label>
      <input id="ys" type="range" min="250" max="3000" step="50" value="1500" />
      <span id="ysv">1500 mV</span>
      <span class="spacer"></span>
      <span class="pill">fs = 250 Hz</span>
      <span class="pill">frame = 25 samples</span>
    </div>

    <div class="row">
      <label>Mains (Hz):</label>
      <input id="hz" type="range" min="45" max="65" step="1" value="50" />
      <span id="hzv">50 Hz</span>

      <label style="margin-left:12px">Q:</label>
      <input id="qq" type="range" min="10" max="50" step="1" value="30" />
      <span id="qqv">30</span>
    </div>

    <canvas id="cv"></canvas>
  </div>

  <script>
    (() => {
      // ---- Config (must match firmware) ----
      const SAMPLE_RATE = 250;   // Hz
      const BATCH = 25;    // samples per WS frame
      const SECONDS = 6;     // visible history
      const CAP = SAMPLE_RATE * SECONDS;

      // ---- DOM refs ----
      const cv = document.getElementById('cv');
      const cx = cv.getContext('2d');
      const st = document.getElementById('status');
      const leadEl = document.getElementById('lead');
      const hrEl = document.getElementById('hr');

      const ys = document.getElementById('ys');
      const ysv = document.getElementById('ysv');
      const hz = document.getElementById('hz');
      const hzv = document.getElementById('hzv');
      const qq = document.getElementById('qq');
      const qqv = document.getElementById('qqv');

      // ---- Canvas DPI scaling ----
      function resizeCanvas() {
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const rect = cv.getBoundingClientRect();
        cv.width = Math.floor(rect.width * dpr);
        cv.height = Math.floor(320 * dpr);       // fixed CSS height
        cx.setTransform(dpr, 0, 0, dpr, 0, 0);   // draw in CSS pixels
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      // ---- UI state ----
      let yScale = parseInt(localStorage.getItem('ys') || ys.value, 10);
      ys.value = yScale; ysv.textContent = yScale + ' mV';
      ys.oninput = () => { yScale = parseInt(ys.value, 10); ysv.textContent = yScale + ' mV'; localStorage.setItem('ys', ys.value); };

      let ws = null;
      function sendCtl(msg) { if (ws && ws.readyState === 1) ws.send(msg); }

      // Restore notch controls if saved
      const savedHz = localStorage.getItem('notchHz'); if (savedHz) hz.value = savedHz;
      const savedQ = localStorage.getItem('notchQ'); if (savedQ) qq.value = savedQ;
      hzv.textContent = `${hz.value} Hz`;
      qqv.textContent = `${qq.value}`;

      hz.oninput = () => {
        hzv.textContent = `${hz.value} Hz`;
        localStorage.setItem('notchHz', hz.value);
        sendCtl(`notchHz=${hz.value}`);
      };
      qq.oninput = () => {
        qqv.textContent = `${qq.value}`;
        localStorage.setItem('notchQ', qq.value);
        sendCtl(`notchQ=${qq.value}`);
      };

      // ---- Ring buffer ----
      const buf = new Int16Array(CAP);
      let head = 0, count = 0, totalSamples = 0;
      function pushBatch(a16) {
        for (let i = 0; i < a16.length; i++) {
          buf[head] = a16[i];
          head = (head + 1) % CAP;
          if (count < CAP) count++;
          totalSamples++;
        }
      }

      // ---- Simple R-peak detector + BPM ----
      // Adaptive envelope via EMA(|signal|); threshold = k * env
      let env = 0, last = 0, rising = false, lastPeakIdx = -1e9;
      const alpha = 0.98;            // envelope smoothing
      const k = 2.5;                 // threshold multiplier
      const refracSamp = Math.floor(0.2 * SAMPLE_RATE); // 200 ms
      let peaks = [];                // absolute sample indices

      function processBatch(a16) {
        for (let i = 0; i < a16.length; i++) {
          const v = a16[i];
          const a = Math.abs(v);
          env = alpha * env + (1 - alpha) * a;
          const thr = k * env;

          if (v > last) rising = true;
          if (rising && v < last && last > thr && (totalSamples - refracSamp) > lastPeakIdx) {
            const peakIdx = totalSamples - 1;
            lastPeakIdx = peakIdx;
            peaks.push(peakIdx);
            // Keep only last 10 s of peaks
            const cutoff = totalSamples - SAMPLE_RATE * 10;
            while (peaks.length && peaks[0] < cutoff) peaks.shift();
            updateHR();
            rising = false;
          }
          last = v;
        }
      }

      function updateHR() {
        if (peaks.length < 2) { hrEl.textContent = '-- bpm'; return; }
        const rr = [];
        for (let i = 1; i < peaks.length; i++) rr.push((peaks[i] - peaks[i - 1]) / SAMPLE_RATE);
        const recent = rr.slice(-8).sort((a, b) => a - b);
        const medRR = recent[Math.floor(recent.length / 2)];
        const bpm = Math.max(0, Math.min(240, 60 / medRR));
        hrEl.textContent = `${bpm.toFixed(0)} bpm`;
      }

      // ---- Plotter ----
      function draw() {
        const W = cv.clientWidth, H = cv.clientHeight;
        cx.clearRect(0, 0, W, H);

        // grid
        cx.globalAlpha = 0.25;
        cx.strokeStyle = '#334155';
        cx.lineWidth = 1;
        cx.beginPath();
        for (let x = 0; x < W; x += 25) { cx.moveTo(x, 0); cx.lineTo(x, H); }
        for (let y = 0; y < H; y += 25) { cx.moveTo(0, y); cx.lineTo(W, y); }
        cx.stroke();
        cx.globalAlpha = 1;

        // midline
        cx.strokeStyle = '#475569';
        cx.beginPath(); cx.moveTo(0, H / 2); cx.lineTo(W, H / 2); cx.stroke();

        if (count > 0) {
          // waveform
          cx.strokeStyle = '#86efac';
          cx.lineWidth = 2;
          cx.beginPath();
          const span = Math.min(count, CAP);
          for (let x = 0; x < W; x++) {
            const idx = (head - 1 - Math.floor(x * span / W) + CAP) % CAP;
            const mv = buf[idx];
            const y = H / 2 - (mv / yScale) * (H * 0.45);
            if (x === 0) cx.moveTo(W - 1 - x, y); else cx.lineTo(W - 1 - x, y);
          }
          cx.stroke();

          // peak markers (last SECONDS)
          cx.strokeStyle = '#22c55e';
          const now = totalSamples;
          for (const p of peaks) {
            const age = (now - p) / SAMPLE_RATE;
            if (age < 0 || age > SECONDS) continue;
            const x = W - (age / SECONDS) * W;
            cx.beginPath(); cx.moveTo(x, 10); cx.lineTo(x, H - 10); cx.stroke();
          }
        }

        requestAnimationFrame(draw);
      }
      requestAnimationFrame(draw);

      // ---- WebSocket ----
      function connect() {
        const proto = (location.protocol === 'https:') ? 'wss' : 'ws';
        ws = new WebSocket(`${proto}://${location.host}/ws`);
        ws.binaryType = 'arraybuffer';

        ws.onopen = () => {
          st.textContent = 'connected';
          leadEl.style.display = 'none';
          // send current notch settings
          sendCtl(`notchHz=${hz.value}`);
          sendCtl(`notchQ=${qq.value}`);
        };
        ws.onclose = () => { st.textContent = 'disconnected — retrying…'; setTimeout(connect, 750); };
        ws.onerror = () => { st.textContent = 'error'; };

        ws.onmessage = (ev) => {
          if (typeof ev.data === 'string') {
            if (ev.data === 'leads_off') leadEl.style.display = '';
            if (ev.data === 'leads_on') leadEl.style.display = 'none';
            return;
          }
          const a16 = new Int16Array(ev.data);
          if (a16.length) { pushBatch(a16); processBatch(a16); }
        };
      }
      connect();
    })();
  </script>
</body>

</html>
